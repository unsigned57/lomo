product:
  type: lib
  platforms: [ android ]

settings:
  junit: junit-5
  android:
    namespace: com.lomo.data
    minSdk: 26
    compileSdk: 37
  jvm:
    release: 25
    jdk:
      version: 26
      selectionMode: javaHome
  kotlin:
    allWarningsAsErrors: true
    freeCompilerArgs:
      - -Xannotation-default-target=param-property
    serialization:
      enabled: true
      version: 1.11.0
    ksp:
      version: 2.3.9
      processors:
        - androidx.room3:room3-compiler:3.0.0-alpha04
      processorOptions:
        room.schemaLocation: ./schemas

repositories:
  - https://jitpack.io

dependencies:
  - //domain: exported
  - bom: aws.sdk.kotlin:bom:1.6.73
  - androidx.core:core-ktx:1.18.0
  - aws.sdk.kotlin:s3
  - aws.smithy.kotlin:http-client-engine-okhttp
  - org.jetbrains.kotlinx:kotlinx-coroutines-android:1.11.0: runtime-only
  - org.bouncycastle:bcprov-jdk18on:1.84
  - androidx.room3:room3-runtime:3.0.0-alpha04
  - androidx.room3:room3-paging:3.0.0-alpha04
  - androidx.sqlite:sqlite-bundled:2.7.0-alpha04
  - io.insert-koin:koin-android:4.0.0: exported
  - io.insert-koin:koin-androidx-workmanager:4.0.0: exported
  - androidx.documentfile:documentfile:1.1.0
  - androidx.datastore:datastore-preferences:1.2.1
  - androidx.work:work-runtime-ktx:2.11.2: exported
  - io.ktor:ktor-server-cio:3.5.0
  - io.ktor:ktor-server-content-negotiation:3.5.0
  - io.ktor:ktor-serialization-kotlinx-json:3.5.0
  - io.ktor:ktor-client-okhttp:3.5.0
  - io.ktor:ktor-client-content-negotiation:3.5.0
  - org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0
  - com.squareup.okio:okio:3.17.0
  - org.eclipse.jgit:org.eclipse.jgit:7.6.0.202603022253-r: exported
  - com.github.bitfireAT:dav4jvm:2.2.1
  - com.jakewharton.timber:timber:5.0.1

test-dependencies:
  - io.kotest:kotest-runner-junit5:6.1.11
  - io.kotest:kotest-assertions-core:6.1.11
  - io.kotest:kotest-property:6.1.11
  - io.kotest:kotest-framework-engine:6.1.11
  - io.mockk:mockk:1.14.9
  - org.jetbrains.kotlinx:kotlinx-coroutines-test:1.11.0
  - app.cash.turbine:turbine:1.2.1
  - io.ktor:ktor-client-mock:3.5.0
  - org.xerial:sqlite-jdbc:3.53.1.0: runtime-only
  - androidx.test.ext:junit:1.3.0
