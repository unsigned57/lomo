config:
  validation: true
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
empty-blocks:
  EmptyDefaultConstructor:
    active: true
style:
  ForbiddenComment:
    active: true
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - android.*
      - androidx.compose.*
      - androidx.lifecycle.*
      - androidx.room.*
      - dagger.*
      - javax.inject.*
      - io.ktor.*
      - org.eclipse.jgit.*
      - com.lomo.data.*
  UnusedParameter:
    active: true
lomo-architecture:
  DomainLayerIsolation:
    active: true
  DomainPackageShape:
    active: true
  UseCaseLocation:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
