name: Dependency Hygiene

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  dependency-hygiene:
    runs-on: ubuntu-latest
    env:
      HOME: ${{ github.workspace }}/.home
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
      XDG_DATA_HOME: ${{ github.workspace }}/.local/share
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle/ci
      GRADLE_OPTS: -Duser.home=${{ github.workspace }}/.home
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache repo-local Gradle state
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/ci
          key: dependency-hygiene-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            dependency-hygiene-gradle-${{ runner.os }}-

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run dependency hygiene checks
        run: |
          mkdir -p "$HOME" "$ANDROID_USER_HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" "$GRADLE_USER_HOME"
          ./gradlew --project-dir "$GITHUB_WORKSPACE" --no-daemon --build-cache --console=plain versionCatalogUpdate --check dependencyVulnerabilityCheck

      - name: Upload dependency hygiene reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-hygiene-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/**
            **/build/dependency-check-report.*
