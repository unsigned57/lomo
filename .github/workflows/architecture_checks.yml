name: Quality Checks

on:
  pull_request:
  push:
    tags-ignore:
      - 'v*'

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HOME: ${{ github.workspace }}/.home
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
      XDG_DATA_HOME: ${{ github.workspace }}/.local/share
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle/ci
      GRADLE_OPTS: -Duser.home=${{ github.workspace }}/.home
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache repo-local Gradle state
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/ci
          key: quality-gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            quality-gradle-${{ runner.os }}-

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure diff base refs exist
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
          fi

      - name: Run repository quality gate
        run: |
          mkdir -p "$HOME" "$ANDROID_USER_HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" "$GRADLE_USER_HOME"
          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            export MEANINGFUL_TEST_DIFF_BASE="$(git merge-base HEAD origin/main)"
          fi
          ./gradlew --project-dir "$GITHUB_WORKSPACE" --no-daemon --build-cache --console=plain qualityCheck

      - name: Upload quality reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/**
            **/build/test-results/**
