name: Quality Checks

on:
  pull_request:
  push:
    tags-ignore:
      - 'v*'

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HOME: ${{ github.workspace }}/.home
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
      XDG_DATA_HOME: ${{ github.workspace }}/.local/share
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      LOMO_KOTLIN_GRADLE_USER_HOME: ${{ github.workspace }}/.gradle/kotlin-toolchain
      KOTLIN_CLI_BOOTSTRAP_CACHE_DIR: ${{ github.workspace }}/.kotlin-cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache repo-local Toolchain state
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache
            ${{ github.workspace }}/.gradle/kotlin-toolchain
            ${{ github.workspace }}/.kotlin-cli
          key: quality-kotlin-toolchain-${{ runner.os }}-${{ hashFiles('kotlin', 'project.yaml', '**/module.yaml') }}
          restore-keys: |
            quality-kotlin-toolchain-${{ runner.os }}-

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '26'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure diff base refs exist
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
          fi

      - name: Run repository quality gate
        run: |
          mkdir -p "$HOME" "$ANDROID_USER_HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME"
          export LOMO_KOTLIN_ANDROID_SDK="$ANDROID_HOME"
          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            export MEANINGFUL_TEST_DIFF_BASE="$(git merge-base HEAD origin/main)"
          fi
          quality/scripts/kotlin_quality_check.sh --build-dir=.kotlin/toolchain-build/ci-quality

      - name: Upload quality reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/**
            **/build/test-results/**
