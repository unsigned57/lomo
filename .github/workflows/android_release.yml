name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 29.0.14206865
      HOME: ${{ github.workspace }}/.home
      ANDROID_USER_HOME: ${{ github.workspace }}/.android
      XDG_DATA_HOME: ${{ github.workspace }}/.local/share
      XDG_CONFIG_HOME: ${{ github.workspace }}/.config
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle/ci
      GRADLE_OPTS: -Duser.home=${{ github.workspace }}/.home
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${NDK_VERSION}"

      - name: Validate Local Baseline Profiles
        run: |
          test -s app/src/main/baseline-prof.txt
          test -s app/src/main/baselineProfiles/generated.txt

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          test -n "$ENCODED_KEYSTORE"
          echo "$ENCODED_KEYSTORE" | base64 -di > release.keystore
          test -s release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure origin main ref exists
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Run repository quality gate
        run: |
          mkdir -p "$HOME" "$ANDROID_USER_HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" "$GRADLE_USER_HOME"
          export MEANINGFUL_TEST_DIFF_BASE="$(git merge-base HEAD origin/main)"
          ./gradlew --project-dir "$GITHUB_WORKSPACE" --no-daemon --build-cache --console=plain qualityCheck

      - name: Build Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p "$HOME" "$ANDROID_USER_HOME" "$XDG_DATA_HOME" "$XDG_CONFIG_HOME" "$GRADLE_USER_HOME"
          ./gradlew --project-dir "$GITHUB_WORKSPACE" --no-daemon --build-cache --console=plain assembleRelease

      - name: Verify Baseline Embedded In APK
        run: |
          APK_PATH="$(ls app/build/outputs/apk/release/*.apk | head -n 1)"
          unzip -l "$APK_PATH" > /tmp/apk-contents.txt
          grep -q "assets/dexopt/baseline.prof" /tmp/apk-contents.txt
          grep -q "assets/dexopt/baseline.profm" /tmp/apk-contents.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/**
            **/build/outputs/mapping/release/**
            **/build/test-results/**

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
