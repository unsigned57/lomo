product:
  type: lib
  platforms: [ android ]

settings:
  compose:
    enabled: true
    resources:
      packageName: com.lomo.ui.generated.resources
  junit: junit-5
  android:
    namespace: com.lomo.ui
    minSdk: 26
    compileSdk: 37
  jvm:
    release: 25
    jdk:
      version: 26
      selectionMode: javaHome
  kotlin:
    allWarningsAsErrors: true
    freeCompilerArgs:
      - -Xannotation-default-target=param-property

dependencies:
  - //domain: exported
  - androidx.compose.ui:ui:1.12.0-alpha02
  - androidx.compose.ui:ui-graphics:1.12.0-alpha02
  - androidx.compose.ui:ui-tooling-preview:1.12.0-alpha02
  - androidx.compose.material3:material3-android:1.5.0-alpha19: exported
  - androidx.activity:activity-compose:1.13.0
  - androidx.compose.material:material-icons-extended:1.7.8
  - io.coil-kt.coil3:coil-compose:3.4.0
  - io.coil-kt.coil3:coil-network-okhttp:3.4.0
  - org.jetbrains.kotlinx:kotlinx-collections-immutable:0.4.0
  - com.mikepenz:multiplatform-markdown-renderer-android:0.40.2: exported
  - sh.calvin.reorderable:reorderable:3.1.0
  - androidx.compose.ui:ui-tooling:1.12.0-alpha02: runtime-only
  - androidx.compose.ui:ui-test-manifest:1.12.0-alpha02: runtime-only
  - androidx.media3:media3-exoplayer:1.10.1

test-dependencies:
  - io.kotest:kotest-runner-junit5:6.1.11
  - io.kotest:kotest-assertions-core:6.1.11
  - io.kotest:kotest-property:6.1.11
  - io.kotest:kotest-framework-engine:6.1.11
  - org.jetbrains.kotlinx:kotlinx-coroutines-test:1.11.0
  - app.cash.turbine:turbine:1.2.1
  - io.mockk:mockk:1.14.9
  - androidx.test.ext:junit:1.3.0
  - androidx.compose.ui:ui-test-junit4:1.12.0-alpha02
