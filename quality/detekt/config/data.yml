config:
  validation: true
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
empty-blocks:
  EmptyDefaultConstructor:
    active: true
style:
  ForbiddenComment:
    active: true
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - com.lomo.app.*
      - com.lomo.ui.*
      - androidx.lifecycle.ViewModel
      - androidx.compose.*
  UnusedParameter:
    active: true
lomo-architecture:
  RepositoryImplLocation:
    active: true
  DaoLocation:
    active: true
  EntityLocation:
    active: true
  ComposableLayer:
    active: true
  DataRepositoryContract:
    active: true
  DataLayerUiDependency:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
