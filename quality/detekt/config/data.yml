config:
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
complexity:
  TooManyFunctions:
    ignoreOverridden: true
    ignoreAnnotated:
      - Database
    excludes:
      - "**/com/lomo/data/s3/S3RcloneCryptCompatCodec.kt"
  ComplexCondition:
    allowedConditions: 4
  CyclomaticComplexMethod:
    allowedComplexity: 18
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: true
    ignoreLocalFunctions: true
  LongMethod:
    allowedLines: 90
  LongParameterList:
    allowedFunctionParameters: 6
    allowedConstructorParameters: 7
    ignoreDefaultParameters: true
  NestedBlockDepth:
    allowedDepth: 5
  NestedScopeFunctions:
    active: true
  ReplaceSafeCallChainWithRun:
    active: true
coroutines:
  CoroutineLaunchedInTestWithoutRunTest:
    active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    dispatcherNames:
      - IO
      - Default
      - Main
      - Unconfined
  SuspendFunInFinallySection:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
exceptions:
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - CancellationException
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    exceptionNames:
      - Throwable
      - RuntimeException
      - Error
style:
  MagicNumber:
    excludes:
      - "**/com/lomo/data/s3/Base32768SafeEncoding.kt"
      - "**/com/lomo/data/s3/S3RcloneCryptCompatCodec.kt"
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.lowercase(kotlin.String)"
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.uppercase(kotlin.String)"
      - reason: "String.hashCode() is not stable across JVM runs; use SHA-256 (toVersionHash) for persistence."
        value: "kotlin.text.hashCode(kotlin.String)"
      - reason: "ConcurrentHashMap with credentials in key leaks entries after credential changes."
        value: "java.util.concurrent.ConcurrentHashMap.getOrPut"
  ForbiddenComment:
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - com.lomo.app.*
      - com.lomo.ui.*
      - androidx.lifecycle.ViewModel
      - androidx.compose.*
  NullableBooleanCheck:
    active: true
  CanBeNonNullable:
    active: true
  UnusedPrivateProperty:
    active: true
  UseEmptyCounterpart:
    active: true
  UseIsNullOrEmpty:
    active: true
  VarCouldBeVal:
    active: true
  ReturnCount:
    max: 4
    excludeLabeled: true
    excludeGuardClauses: true
lomo-architecture:
  RepositoryImplLocation:
    active: true
  DaoLocation:
    active: true
  EntityLocation:
    active: true
  ComposableLayer:
    active: true
  DataRepositoryContract:
    active: true
  DataLayerUiDependency:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
  NoConstantBranchCondition:
    active: true
  NoUnreachableBlockTail:
    active: true
  NoRedundantExhaustiveElse:
    active: true
  NoCrossFileDuplicateTopLevel:
    active: true
    ignoreAnnotated:
      - Composable
      - Preview
    ignoreOperator: true
  NoUnreferencedTopLevelDeclaration:
    active: true
    ignoreAnnotated:
      - VisibleForTesting
      - Keep
      - Preview
      - Module
      - Provides
      - Binds
      - Multibinds
      - HiltViewModel
