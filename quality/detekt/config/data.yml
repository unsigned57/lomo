config:
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
complexity:
  TooManyFunctions:
    ignoreOverridden: true
    ignoreAnnotated:
      - Database
  ComplexCondition:
    allowedConditions: 4
  CyclomaticComplexMethod:
    allowedComplexity: 18
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: true
    ignoreLocalFunctions: true
  LongMethod:
    allowedLines: 90
  LongParameterList:
    allowedFunctionParameters: 6
    allowedConstructorParameters: 7
    ignoreDefaultParameters: true
  NestedBlockDepth:
    allowedDepth: 5
  NestedScopeFunctions:
    active: true
  ReplaceSafeCallChainWithRun:
    active: true
coroutines:
  CoroutineLaunchedInTestWithoutRunTest:
    active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    dispatcherNames:
      - IO
      - Default
      - Main
      - Unconfined
  SuspendFunInFinallySection:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
exceptions:
  TooGenericExceptionCaught:
    exceptionNames:
      - Throwable
      - RuntimeException
      - Error
style:
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.lowercase(kotlin.String)"
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.uppercase(kotlin.String)"
  ForbiddenComment:
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - com.lomo.app.*
      - com.lomo.ui.*
      - androidx.lifecycle.ViewModel
      - androidx.compose.*
  NullableBooleanCheck:
    active: true
  ReturnCount:
    max: 4
    excludeLabeled: true
    excludeGuardClauses: true
lomo-architecture:
  RepositoryImplLocation:
    active: true
  DaoLocation:
    active: true
  EntityLocation:
    active: true
  ComposableLayer:
    active: true
  DataRepositoryContract:
    active: true
  DataLayerUiDependency:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
