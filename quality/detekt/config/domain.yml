config:
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
complexity:
  ComplexCondition:
    allowedConditions: 4
  CyclomaticComplexMethod:
    allowedComplexity: 18
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: true
    ignoreLocalFunctions: true
  LongMethod:
    allowedLines: 80
  LongParameterList:
    ignoreDefaultParameters: true
  NestedBlockDepth:
    allowedDepth: 5
  NestedScopeFunctions:
    active: true
  ReplaceSafeCallChainWithRun:
    active: true
coroutines:
  CoroutineLaunchedInTestWithoutRunTest:
    active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    dispatcherNames:
      - IO
      - Default
      - Main
      - Unconfined
  SuspendFunInFinallySection:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
exceptions:
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - CancellationException
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    exceptionNames:
      - Throwable
      - RuntimeException
      - Error
style:
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.lowercase(kotlin.String)"
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.uppercase(kotlin.String)"
  ForbiddenComment:
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - android.*
      - androidx.compose.*
      - androidx.lifecycle.*
      - androidx.room.*
      - dagger.*
      - javax.inject.*
      - io.ktor.*
      - org.eclipse.jgit.*
      - com.lomo.data.*
  NullableBooleanCheck:
    active: true
  CanBeNonNullable:
    active: true
  UnusedPrivateProperty:
    active: true
  UnusedPrivateClass:
    active: true
  UseEmptyCounterpart:
    active: true
  UseIsNullOrEmpty:
    active: true
  VarCouldBeVal:
    active: true
  ReturnCount:
    max: 4
    excludeLabeled: true
    excludeGuardClauses: true
lomo-architecture:
  DomainLayerIsolation:
    active: true
  DomainPackageShape:
    active: true
  UseCaseLocation:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
  NoConstantBranchCondition:
    active: true
  NoUnreachableBlockTail:
    active: true
  NoRedundantExhaustiveElse:
    active: true
  NoCrossFileDuplicateTopLevel:
    active: true
    ignoreAnnotated:
      - Composable
      - Preview
    ignoreOperator: true
  NoUnreferencedTopLevelDeclaration:
    active: true
    ignoreAnnotated:
      - VisibleForTesting
      - Keep
      - Preview
      - Module
      - Provides
      - Binds
      - Multibinds
      - HiltViewModel
