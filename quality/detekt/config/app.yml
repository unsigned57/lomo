config:
  excludes:
    - "lomo-architecture.*"
    - "lomo-architecture>.*>.*"
complexity:
  ComplexCondition:
    allowedConditions: 4
  CyclomaticComplexMethod:
    allowedComplexity: 20
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: true
    ignoreLocalFunctions: true
  LongMethod:
    allowedLines: 100
  LongParameterList:
    allowedFunctionParameters: 7
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
  NestedBlockDepth:
    allowedDepth: 5
  NestedScopeFunctions:
    active: true
  ReplaceSafeCallChainWithRun:
    active: true
coroutines:
  CoroutineLaunchedInTestWithoutRunTest:
    active: true
  GlobalCoroutineUsage:
    active: true
  InjectDispatcher:
    dispatcherNames:
      - IO
      - Default
      - Main
      - Unconfined
  SuspendFunInFinallySection:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
exceptions:
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - CancellationException
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    exceptionNames:
      - Throwable
      - RuntimeException
      - Error
naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
      - Preview
style:
  ForbiddenMethodCall:
    active: true
    methods:
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.lowercase(kotlin.String)"
      - reason: "Use an explicit locale when normalizing case for non-user-facing identifiers."
        value: "kotlin.text.uppercase(kotlin.String)"
  ForbiddenComment:
    comments:
      - reason: "Resolve backlog markers before merge."
        value: "TODO:"
      - reason: "Resolve broken-behavior markers before merge."
        value: "FIXME:"
      - reason: "Release blockers must not stay in committed code."
        value: "STOPSHIP:"
  ForbiddenImport:
    active: true
    forbiddenImports:
      - com.lomo.data.*
  NullableBooleanCheck:
    active: true
  CanBeNonNullable:
    active: true
  UnusedPrivateProperty:
    active: true
  UseEmptyCounterpart:
    active: true
  UseIsNullOrEmpty:
    active: true
  VarCouldBeVal:
    active: true
  ReturnCount:
    max: 4
    excludeLabeled: true
    excludeGuardClauses: true
lomo-architecture:
  AppSourceBoundary:
    active: true
  AppBuildDependencyBoundary:
    active: true
    allowedDataProjectDependencies:
      # Batch 4C: current app->data edge is reported by the rule but temporarily allowed
      # until the production dependency migration removes it.
      - 'implementation(project(":data"))'
  ViewModelBoundary:
    active: true
  UseCaseLocation:
    active: true
  P0HotspotRepositoryBoundary:
    active: true
  NoSourceSuppressions:
    active: true
  NoPlaceholderImplementation:
    active: true
  NoConstantBranchCondition:
    active: true
  NoUnreachableBlockTail:
    active: true
  NoRedundantExhaustiveElse:
    active: true
  NoCrossFileDuplicateTopLevel:
    active: true
    ignoreAnnotated:
      - Composable
      - Preview
    ignoreOperator: true
  NoUnreferencedTopLevelDeclaration:
    active: true
    ignoreAnnotated:
      - VisibleForTesting
      - Keep
      - Preview
      - Module
      - Provides
      - Binds
      - Multibinds
      - HiltViewModel
  NoSwallowedResult:
    active: true
  NoDeprecatedKept:
    active: true
